name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
            archive_ext: '.tar.gz'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ''
            archive_ext: '.tar.gz'
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ''
            archive_ext: '.tar.gz'
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
            archive_ext: '.tar.gz'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
            archive_ext: '.zip'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools and OpenSSL (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          # Build OpenSSL for musl (no-secure-memory avoids linux/mman.h dependency)
          curl -LO https://www.openssl.org/source/openssl-3.2.1.tar.gz
          tar xzf openssl-3.2.1.tar.gz
          cd openssl-3.2.1
          CC=musl-gcc ./Configure linux-x86_64 --prefix=/usr/local/musl --openssldir=/usr/local/musl/ssl no-shared no-secure-memory no-afalgeng
          make -j$(nproc)
          sudo make install_sw
          echo "OPENSSL_DIR=/usr/local/musl" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p saorsa-gossip

      - name: Build Coordinator binary
        run: cargo build --release --target ${{ matrix.target }} -p saorsa-coordinator

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../saorsa-gossip-${{ matrix.target }}${{ matrix.archive_ext }} \
            saorsa-gossip${{ matrix.suffix }} \
            saorsa-gossip-coordinator${{ matrix.suffix }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../saorsa-gossip-${{ matrix.target }}${{ matrix.archive_ext }} `
            saorsa-gossip${{ matrix.suffix }} `
            saorsa-gossip-coordinator${{ matrix.suffix }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: saorsa-gossip-${{ matrix.target }}
          path: saorsa-gossip-${{ matrix.target }}${{ matrix.archive_ext }}

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-hakari
        # Required to strip the workspace-hack dependency from member crates
        # before publish. workspace-hack itself has `publish = false`, so leaving
        # it as a dep blocks `cargo publish` with "no matching package named
        # `saorsa-gossip-workspace-hack` found / location searched: crates.io".
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hakari

      - name: Strip workspace-hack deps for publish
        # `cargo hakari remove-deps --yes` removes the workspace-hack dep
        # from every member crate's Cargo.toml in-place. Safe in CI because
        # the runner is ephemeral — local dev keeps hakari enabled via
        # `cargo hakari generate`. After this step, cargo publish can resolve
        # every member's dep graph against crates.io alone.
        run: cargo hakari remove-deps --yes

      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # Publish each crate in dependency order with retry logic
          CRATES=(
            "crates/types"
            "crates/identity"
            "crates/transport"
            "crates/membership"
            "crates/pubsub"
            "crates/crdt-sync"
            "crates/groups"
            "crates/presence"
            "crates/coordinator"
            "crates/rendezvous"
            "crates/runtime"
          )

          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            cd "$crate"

            # Try to publish, handle already-published gracefully
            OUTPUT=$(cargo publish --no-verify 2>&1) && {
              echo "Successfully published $crate"
            } || {
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "$crate already published, skipping..."
              else
                echo "$OUTPUT"
                echo "Failed to publish $crate"
                exit 1
              fi
            }

            cd ../..
            # Wait for crates.io to index before publishing dependent crates
            echo "Waiting 30s for crates.io indexing..."
            sleep 30
          done

          echo "All crates published successfully!"
