[package]
name = "saorsa-gossip"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Canonical facade and CLI for the Saorsa Gossip post-quantum gossip stack"
keywords = ["gossip", "p2p", "post-quantum", "networking", "crdt"]
categories = ["network-programming", "asynchronous", "cryptography", "command-line-utilities"]
readme = "../../README.md"

[lib]
name = "saorsa_gossip"
path = "src/lib.rs"

[[bin]]
name = "saorsa-gossip"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }
hex = "0.4"
shellexpand = "3.1"
self_update = { version = "0.41", features = ["archive-tar", "compression-flate2"] }

# Async runtime
tokio = { workspace = true, features = ["full"] }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Crypto
saorsa-pqc = { workspace = true }

# Transport
ant-quic = { workspace = true }
bytes = { workspace = true }

# Workspace crates
saorsa-gossip-types = { workspace = true }
saorsa-gossip-identity = { workspace = true }
saorsa-gossip-transport = { workspace = true }
saorsa-gossip-coordinator = { workspace = true }
saorsa-gossip-membership = { workspace = true }
saorsa-gossip-pubsub = { workspace = true }
saorsa-gossip-rendezvous = { workspace = true }
saorsa-gossip-runtime = { workspace = true }
saorsa-gossip-groups = { workspace = true }
saorsa-gossip-presence = { workspace = true }
saorsa-gossip-crdt-sync = { workspace = true }
saorsa-gossip-workspace-hack = { version = "0.1", path = "../../saorsa-gossip-workspace-hack" }
